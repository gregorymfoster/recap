name: Feature request
description: Suggest an idea for Recap
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Note: Recap is privacy-first and offline-first — features requiring a server or sending meeting content off-device are out of scope unless strictly opt-in.
