name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package-tests:
    name: Package tests
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package:
          [RecapCore, RecapAudio, RecapTranscription, RecapEnhancement, RecapUI]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Test ${{ matrix.package }}
        run: swift test --package-path Packages/${{ matrix.package }}

  app-build:
    name: App build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen
      - name: Build
        run: |
          xcodebuild build \
            -project Recap.xcodeproj \
            -scheme Recap \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -50
