name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  package-tests:
    name: Package tests
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package:
          [RecapCore, RecapAudio, RecapTranscription, RecapEnhancement, RecapUI]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            Packages/${{ matrix.package }}/.build
          key: spm-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.swift', matrix.package)) }}
      - name: Test ${{ matrix.package }}
        run: swift test --package-path Packages/${{ matrix.package }}

  app-build:
    name: App build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
          key: app-build-${{ hashFiles('project.yml', 'Packages/*/Package.swift') }}
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen
      - name: Build
        run: |
          xcodebuild build \
            -project Recap.xcodeproj \
            -scheme Recap \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -50

  transcription-eval:
    name: Transcription eval (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            Packages/RecapTranscription/.build
          key: spm-RecapTranscription-${{ hashFiles('Packages/RecapTranscription/Package.swift') }}
      - name: Cache WhisperKit models
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/Recap/Models
          key: whisperkit-models-${{ hashFiles('Fixtures/transcribe/**/expectations.json') }}
      - name: Run transcribe-eval
        run: swift run --package-path Packages/RecapTranscription transcribe-eval Fixtures/transcribe

  lint:
    name: Lint
    # lint.sh must remain POSIX-portable (runs on ubuntu, not macOS) —
    # avoid GNU-only grep flags (e.g. -P) and BSD-only tools (e.g. `stat -f`).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint.sh
        run: ./Scripts/lint.sh

  enhancement-eval:
    name: Enhancement eval (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            Packages/RecapEnhancement/.build
          key: spm-RecapEnhancement-${{ hashFiles('Packages/RecapEnhancement/Package.swift') }}
      - name: Run enhance-eval
        run: |
          swift run --package-path Packages/RecapEnhancement enhance-eval --json Fixtures/enhance && status=0 || status=$?
          if [ "$status" -eq 69 ]; then
            echo "Apple Intelligence unavailable on this runner — skipping enhancement eval."
            exit 0
          fi
          exit "$status"

  soak-test:
    name: Soak test (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Run soak-test
        run: ./Scripts/soak-test.sh
