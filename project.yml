name: Recap
options:
  bundleIdPrefix: com.gregfoster
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0
  RecapCore:
    path: Packages/RecapCore
  RecapAudio:
    path: Packages/RecapAudio
  RecapTranscription:
    path: Packages/RecapTranscription
  RecapEnhancement:
    path: Packages/RecapEnhancement
  RecapUI:
    path: Packages/RecapUI

targets:
  Recap:
    type: application
    platform: macOS
    sources:
      - Recap
    dependencies:
      - package: RecapCore
      - package: RecapAudio
      - package: RecapTranscription
      - package: RecapEnhancement
      - package: RecapUI
      - package: Sparkle
    info:
      path: Recap/Info.plist
      properties:
        CFBundleDisplayName: Recap
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "14"
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: Recap records your microphone during meetings you start. Audio never leaves your Mac.
        NSAudioCaptureUsageDescription: Recap records system audio so other meeting participants are captured. Audio never leaves your Mac.
        NSHumanReadableCopyright: © 2026 Greg Foster. MIT License.
        # The design system is light-only (hardcoded token colors); render Aqua in dark mode too.
        NSRequiresAquaSystemAppearance: true
        SUFeedURL: https://gregorymfoster.github.io/recap/appcast.xml
        SUPublicEDKey: WsqMrsc1Rv980zEPBuwQtawmJ0em/FshzcflTky6naY=
        SUEnableAutomaticChecks: true
    entitlements:
      path: Recap/Recap.entitlements
      properties:
        com.apple.security.device.audio-input: true
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: true
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.recap
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2V7W69N399
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "14"
        ENABLE_USER_SCRIPT_SANDBOXING: true

schemes:
  Recap:
    build:
      targets:
        Recap: all
    run:
      config: Debug
    archive:
      config: Release
